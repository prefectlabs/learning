title: Building Interactive Apps with FastMCP
teaser: Build tiny FastMCP apps, one small step at a time.
description: |-
  Move beyond text-in and text-out with interactive FastMCP apps. In this track, you'll build a Project Dashboard that starts with one tiny app, then adds prefab UI tools, charts backed by resource data, a form submission flow, and state that survives across interactions.

  Each challenge stays small, but the ideas connect into a larger workflow: one tool renders UI, another turns data into charts, another collects form input, and another remembers a choice for the next interaction.

  This course assumes you're already comfortable with FastMCP fundamentals. By the end, you'll know when to use `app=True`, when to graduate to `FastMCPApp`, and how to design small app experiences that feel native inside an MCP conversation.
