title: FastMCP Foundations
teaser: Build MCP servers in Python with FastMCP. Give AI assistants the tools they
  need to interact with your systems.
description: |-
  The Model Context Protocol (MCP) is how AI assistants connect to the real world. FastMCP makes building those connections simple with a Pythonic, decorator-based approach. In this track, you'll learn to create
  MCP servers that expose tools, resources, and prompts to any MCP-compatible client. No boilerplate, no complexity, just Python code that extends what AI can do.
